<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 380px;
      max-height: 500px;
      overflow-y: auto;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #13131f;
      color: #e0e0e0;
    }

    .header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }

    .header .logo {
      width: 22px;
      height: 22px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #fff;
      font-weight: 700;
    }

    .current-app {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(99, 102, 241, 0.05);
    }

    .current-app .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 8px;
    }

    .app-row {
      padding: 12px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .app-row:hover {
      background: rgba(255,255,255,0.02);
    }

    .app-info {
      flex: 1;
      min-width: 0;
    }

    .app-name {
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .app-url {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .redirect-toggle {
      display: flex;
      gap: 2px;
      background: rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 2px;
      flex-shrink: 0;
    }

    .redirect-toggle button {
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.4);
      font-size: 11px;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .redirect-toggle button:hover {
      color: rgba(255,255,255,0.7);
    }

    .redirect-toggle button.active-no {
      background: rgba(239, 68, 68, 0.25);
      color: #fca5a5;
    }

    .redirect-toggle button.active-tentative {
      background: rgba(234, 179, 8, 0.25);
      color: #fde047;
    }

    .redirect-toggle button.active-yes {
      background: rgba(34, 197, 94, 0.25);
      color: #86efac;
    }

    .empty {
      padding: 40px 20px;
      text-align: center;
      color: rgba(255,255,255,0.3);
      font-size: 13px;
    }

    .section-label {
      padding: 12px 20px 6px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.25);
    }

    .go-btn {
      border: none;
      background: rgba(99, 102, 241, 0.2);
      color: #a5b4fc;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      flex-shrink: 0;
    }

    .go-btn:hover {
      background: rgba(99, 102, 241, 0.35);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">S</div>
    <h1>Seal</h1>
  </div>
  <div id="current"></div>
  <div id="apps"></div>
  <script src="popup.js"></script>
</body>
</html>
